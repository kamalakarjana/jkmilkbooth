apiVersion: apps/v1
kind: Deployment
metadata:
  name: milkbooth-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milkbooth-postgres
  template:
    metadata:
      labels:
        app: milkbooth-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
        - name: POSTGRES_DB
          value: milkbooth
        - name: POSTGRES_USER
          value: milkuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: milkbooth-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: milkbooth-postgres-pvc
